<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Todo List</title> <!-- Task 1 -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <h1 id="app-title">My Todo List</h1> <!-- Task 1 -->

        <div class="input-section">
            <input type="text" id="todo-input" placeholder="Enter todo..." />
            <button id="add-btn" class="btn">Add Todo</button> <!-- Task 2 & 4 -->
        </div>

        <div class="controls">
            <span>Total Items: <span id="count">0</span></span>
            <button id="delete-all">Delete All</button> <!-- Task 5 -->
            <button id="sort-btn">Sort</button> <!-- Task 6 -->
        </div>

        <ul id="todo-list"></ul>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
